services:

  mysql:
    image: mysql:8.0
    container_name: inventory-mysql

    environment:
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}

    ports:
      - "3307:3306"

    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -pspringstudent" ]
      interval: 5s
      timeout: 5s
      retries: 20

    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build: .

    container_name: inventory-app

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: ${DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

volumes:
  mysql-data: